name: DeployProject

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "GithubActionsDemoApp/**"
      - "Test/**"

env:
  DOTNET_VERSION: 8.0.x
  PROJECT: GithubActionsDemoApp/GithubActionsDemoApp.csproj

jobs:
  build:
    #allowing the repo to save 
    permissions:
      contents: write
  
    runs-on: ubuntu-latest

    steps:
      - name: Getting the project
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Compile
        run: dotnet build --no-restore
        #no need to build the test becuase it was previously built 
      - name: Run test 
        run: dotnet test --no-build --verbosity normal
        #getting the artifacts 
      - name: Publish
        run: dotnet publish ${{env.PROJECT}} -c Release -o myapp --runtime win-x86

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:

          path: ./myapp
          name: build
      - name: Zip
        run: zip -r myapp.zip ./myapp
        #using gh release
      - name: Gh Release        
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ./myapp.zip
          body: "Our app"
          tag_name: ${{ github.ref_name }}
