name: DeployProject

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "GithubActionsDemoApp/**"
      - "Test/**"
    tags:
      - '*' #runs under any tag

env:
  DOTNET_VERSION: 8.0.x
  PROJECT: GithubActionsDemoApp/GithubActionsDemoApp.csproj
  #AZURE CONFIGURATION 
  AZURE_APP_SERVICE_NAME: githgubactionsdemoapp #APP SERVICE NAME
  AZURE_APP_SERVICE_PACKAGE_LOCATION: '.' #SAME DIR AS WE ARE GOING TO BE 
  

jobs:
  build:
    #allowing the repo to save 
    permissions:
      contents: write
  
    runs-on: ubuntu-latest

    steps:
      - name: Getting the project
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Compile
        run: dotnet build --no-restore
        #no need to build the test becuase it was previously built 
      - name: Run test 
        run: dotnet test --no-build --verbosity normal
        #getting the artifacts 
      - name: Publish
        run: dotnet publish ${{env.PROJECT}} -c Release -o myapp --runtime win-x86

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          path: ./myapp
          name: build
      - name: Zip
        if: startsWith(github.ref, 'refs/tags/')
        run: zip -r myapp.zip ./myapp
        #using gh release
      - name: Gh Release        
        uses: softprops/action-gh-release@v3.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./myapp.zip
          body: "Our app"
          tag_name: ${{ github.ref_name }}
 
  deploy:
    permissions:
     contents: none #because we apply the least privilage principal 
    runs-on: ubuntu-latest
    needs: build #we need to wait for the build job  
    steps: 
     - name: Getting the web app artifacts
       uses: actions/download-artifact@v3.1.0
       with:
         name: build #referencing the build in the name: Upload a Build Artifact
     - name: Deploy to Azure using Azure webapp   
       uses: Azure/webapps-deploy@v3.0.8
       with: 
         app_name: ${{env.AZURE_APP_SERVICE_NAME}}
         publis-profile: ${{ env.AZURE_PUBLISH_PROFILE }}
         package: ${{env.AZURE_APP_SERVICE_PACKAGE_LOCATION }}
